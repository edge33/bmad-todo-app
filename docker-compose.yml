services:
  postgres:
    image: postgres:16-alpine
    container_name: todoapp-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-todoapp_dev}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:-}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: todoapp-backend:dev
    container_name: todoapp-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-todoapp_dev}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: todoapp-frontend:dev
    container_name: todoapp-frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
