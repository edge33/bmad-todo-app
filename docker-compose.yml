services:
  postgres:
    image: postgres:16-alpine
    container_name: todoapp-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:-}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: todoapp-backend:dev
    container_name: todoapp-backend
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/todoapp_dev}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/package.json:/app/package.json
      - backend_node_modules:/app/node_modules

  frontend:
    image: todoapp-frontend:dev
    container_name: todoapp-frontend
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/package.json:/app/package.json
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
